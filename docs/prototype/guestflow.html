<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GuestFlow — Rental Marketing & CRM</title>
<style>
  :root{
    color-scheme: light;
    --page:#f9f9f7; --surface:#fcfcfb; --surface-2:#f0efec;
    --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,.10);
    --s1:#2a78d6; --s2:#eb6834; --s3:#1baf7a; --s4:#eda100; --s5:#e87ba4; --s6:#008300; --s7:#4a3aa7; --s8:#e34948;
    --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b; --good-text:#006300;
    --accent:#2a78d6; --accent-ink:#ffffff;
    --shadow:0 1px 3px rgba(11,11,11,.07), 0 4px 14px rgba(11,11,11,.05);
  }
  @media (prefers-color-scheme: dark){
    :root{
      color-scheme: dark;
      --page:#0d0d0d; --surface:#1a1a19; --surface-2:#242422;
      --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,.10);
      --s1:#3987e5; --s2:#d95926; --s3:#199e70; --s4:#c98500; --s5:#d55181; --s6:#008300; --s7:#9085e9; --s8:#e66767;
      --good-text:#0ca30c;
      --accent:#3987e5;
      --shadow:0 1px 3px rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background:var(--page); color:var(--ink); font-size:14px; line-height:1.45;
    display:flex; min-height:100vh;
  }
  button{font:inherit; cursor:pointer}
  input,select,textarea{font:inherit; color:var(--ink); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 10px; width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent); outline-offset:1px}
  label{font-size:12px; font-weight:600; color:var(--ink-2); display:block; margin:10px 0 4px}
  ::placeholder{color:var(--muted)}

  /* ---------- layout ---------- */
  .sidebar{
    width:216px; flex:0 0 216px; background:var(--surface); border-right:1px solid var(--border);
    padding:18px 12px; display:flex; flex-direction:column; gap:2px; position:sticky; top:0; height:100vh;
  }
  .logo{display:flex; align-items:center; gap:9px; padding:4px 10px 16px; font-weight:800; font-size:16px; letter-spacing:-.2px}
  .logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--s1),var(--s7));display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
  .navbtn{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; border:none; background:none;
    color:var(--ink-2); font-weight:600; font-size:13.5px; text-align:left; width:100%;
  }
  .navbtn:hover{background:var(--surface-2)}
  .navbtn.active{background:var(--surface-2); color:var(--ink)}
  .navbtn .ic{width:18px; text-align:center; font-size:15px}
  .navbtn .count{margin-left:auto; font-size:11px; background:var(--surface-2); border:1px solid var(--border); border-radius:99px; padding:0 7px; color:var(--muted)}
  .navbtn.active .count{background:var(--surface)}
  .sidebar .foot{margin-top:auto; padding:10px; font-size:11.5px; color:var(--muted); border-top:1px solid var(--border)}

  .main{flex:1; min-width:0; display:flex; flex-direction:column}
  .topbar{
    display:flex; align-items:center; gap:12px; padding:14px 26px; border-bottom:1px solid var(--border);
    background:var(--surface); position:sticky; top:0; z-index:30;
  }
  .topbar h1{font-size:17px; font-weight:750; letter-spacing:-.2px}
  .topbar .spacer{flex:1}
  .topbar select{width:auto; min-width:170px}
  .content{padding:24px 26px 60px; max-width:1180px; width:100%; margin:0 auto}

  /* ---------- generic ---------- */
  .btn{
    border:1px solid var(--border); background:var(--surface); color:var(--ink); border-radius:8px;
    padding:8px 14px; font-weight:650; font-size:13px; display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.small{padding:4px 10px; font-size:12px}
  .btn.danger{color:var(--crit)}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow)}
  .card .card-h{display:flex; align-items:center; gap:10px; padding:14px 18px 0}
  .card .card-h h3{font-size:13.5px; font-weight:700}
  .card .card-h .sub{font-size:12px; color:var(--muted)}
  .pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:650; border-radius:99px; padding:2px 9px; border:1px solid var(--border); background:var(--surface-2); color:var(--ink-2); white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:99px;display:inline-block}
  .grid{display:grid; gap:14px}
  .muted{color:var(--muted)} .small{font-size:12px}
  .row{display:flex; align-items:center; gap:10px}
  h2.section{font-size:15px; font-weight:750; margin:26px 0 12px; letter-spacing:-.2px}
  table{width:100%; border-collapse:collapse; font-size:13px}
  th{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); text-align:left; font-weight:700; padding:10px 14px; border-bottom:1px solid var(--border)}
  td{padding:11px 14px; border-bottom:1px solid var(--grid); vertical-align:middle}
  tr.clickable{cursor:pointer}
  tr.clickable:hover td{background:var(--surface-2)}
  td .name{font-weight:650}
  .num{font-variant-numeric:tabular-nums}

  /* ---------- stat tiles ---------- */
  .tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px}
  .tile{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; box-shadow:var(--shadow)}
  .tile .t-label{font-size:12px; font-weight:650; color:var(--ink-2)}
  .tile .t-value{font-size:28px; font-weight:800; letter-spacing:-.5px; margin-top:4px}
  .tile .t-delta{font-size:12px; margin-top:3px; color:var(--muted)}
  .tile .t-delta .up{color:var(--good-text); font-weight:700}
  .tile .t-delta .down{color:var(--crit); font-weight:700}

  /* ---------- chart bits ---------- */
  .legend{display:flex; flex-wrap:wrap; gap:14px; padding:10px 18px 0; font-size:12px; color:var(--ink-2)}
  .legend .key{display:inline-flex; align-items:center; gap:6px}
  .legend .swatch{width:10px; height:10px; border-radius:3px; display:inline-block}
  .tooltip{
    position:fixed; z-index:99; pointer-events:none; background:var(--surface); border:1px solid var(--border);
    border-radius:9px; box-shadow:var(--shadow); padding:8px 11px; font-size:12px; display:none; min-width:130px;
  }
  .tooltip .tt-title{font-weight:700; margin-bottom:4px}
  .tooltip .tt-row{display:flex; align-items:center; gap:6px; justify-content:space-between; padding:1px 0}
  .tooltip .tt-row .k{display:flex; align-items:center; gap:6px; color:var(--ink-2)}
  .tooltip .swatch{width:9px;height:9px;border-radius:3px;display:inline-block}

  /* ---------- pipeline board ---------- */
  .stage-tabs{display:flex; gap:6px; flex-wrap:wrap}
  .stage-tabs .btn.small.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}

  /* ---------- drawer ---------- */
  .overlay{position:fixed; inset:0; background:rgba(11,11,11,.35); z-index:60; display:none}
  .overlay.open{display:block}
  .drawer{
    position:fixed; top:0; right:-560px; width:min(560px,96vw); height:100vh; background:var(--surface);
    border-left:1px solid var(--border); z-index:70; transition:right .22s ease; display:flex; flex-direction:column;
  }
  .drawer.open{right:0}
  .drawer .d-head{padding:18px 22px 12px; border-bottom:1px solid var(--border)}
  .drawer .d-body{padding:16px 22px; overflow-y:auto; flex:1}
  .drawer h2{font-size:18px; font-weight:800; letter-spacing:-.3px}
  .kv{display:grid; grid-template-columns:110px 1fr; gap:6px 12px; font-size:13px; margin:10px 0}
  .kv .k{color:var(--muted); font-weight:600}
  .timeline{margin-top:6px}
  .tl-item{display:flex; gap:12px; padding:9px 0; border-bottom:1px solid var(--grid)}
  .tl-item:last-child{border-bottom:none}
  .tl-ic{width:28px;height:28px;border-radius:99px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 28px}
  .tl-item .t-when{font-size:11.5px; color:var(--muted)}
  .tl-item.scheduled{opacity:.65}
  .tl-item .t-what{font-weight:600}
  .tl-item .t-body{font-size:12.5px; color:var(--ink-2); margin-top:2px}

  /* ---------- modal ---------- */
  .modal-wrap{position:fixed; inset:0; z-index:80; display:none; align-items:flex-start; justify-content:center; overflow-y:auto; padding:40px 16px; background:rgba(11,11,11,.4)}
  .modal-wrap.open{display:flex}
  .modal{background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:680px; box-shadow:var(--shadow)}
  .modal .m-head{display:flex; align-items:center; padding:16px 22px; border-bottom:1px solid var(--border)}
  .modal .m-head h2{font-size:16px; font-weight:750}
  .modal .m-body{padding:18px 22px}
  .modal .m-foot{display:flex; gap:10px; justify-content:flex-end; padding:14px 22px; border-top:1px solid var(--border)}
  .steps{display:flex; gap:6px; margin-bottom:16px}
  .steps .st{flex:1; height:4px; border-radius:99px; background:var(--surface-2)}
  .steps .st.done{background:var(--accent)}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chip{border:1px solid var(--border); border-radius:99px; padding:5px 12px; font-size:12.5px; font-weight:600; background:var(--surface); color:var(--ink-2); cursor:pointer}
  .chip.on{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
  .platform-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px}
  .pcard{border:1.5px solid var(--border); border-radius:12px; padding:12px; text-align:center; cursor:pointer; background:var(--surface)}
  .pcard:hover{background:var(--surface-2)}
  .pcard.on{border-color:var(--accent); outline:2px solid var(--accent); outline-offset:-1px}
  .pcard .p-ic{font-size:20px}
  .pcard .p-name{font-weight:700; font-size:13px; margin-top:4px}
  .pcard .p-sub{font-size:11px; color:var(--muted)}
  .form-preview{border:1px solid var(--border); border-radius:12px; background:var(--page); padding:14px; margin-top:8px}
  .form-preview .fp-title{font-weight:750; font-size:13.5px}
  .fp-field{background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 10px; margin-top:8px; font-size:12.5px; color:var(--muted); display:flex; justify-content:space-between}
  .fp-field .opt{font-size:10.5px; border:1px solid var(--border); border-radius:99px; padding:0 6px}

  /* ---------- sequences ---------- */
  .seq-steps{display:flex; flex-direction:column; gap:0; margin-top:8px}
  .seq-step{display:flex; gap:12px; align-items:flex-start; position:relative; padding:10px 0 14px 0}
  .seq-step::before{content:""; position:absolute; left:15px; top:38px; bottom:-2px; width:2px; background:var(--grid)}
  .seq-step:last-child::before{display:none}
  .seq-ic{width:32px;height:32px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 32px;border:1px solid var(--border);background:var(--surface-2)}
  .seq-step .s-title{font-weight:700; font-size:13px}
  .seq-step .s-sub{font-size:12px; color:var(--ink-2)}
  .seq-step .s-delay{font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em}

  /* ---------- integrations ---------- */
  .int-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px}
  .int-card{padding:16px; display:flex; flex-direction:column; gap:8px}
  .int-card .row{justify-content:space-between}
  .int-card .i-name{font-weight:750}
  .int-card .i-desc{font-size:12px; color:var(--ink-2); min-height:34px}
  .int-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800}

  /* ---------- toasts ---------- */
  .toasts{position:fixed; bottom:20px; right:20px; z-index:100; display:flex; flex-direction:column; gap:8px; max-width:340px}
  .toast{background:var(--surface); color:var(--ink); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:10px; padding:11px 14px; font-size:13px; box-shadow:var(--shadow); animation:pop .18s ease}
  .toast b{font-weight:750}
  .toast.good{border-left-color:var(--good)}
  @keyframes pop{from{transform:translateY(8px); opacity:0} to{transform:none; opacity:1}}

  .empty{padding:34px; text-align:center; color:var(--muted); font-size:13px}
  @media (max-width:840px){
    .sidebar{width:64px; flex-basis:64px; padding:14px 8px}
    .sidebar .navbtn span.lbl, .sidebar .count, .logo .word, .sidebar .foot{display:none}
    .content{padding:18px 14px 60px}
  }
</style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="spacer"></div>
      <select id="propFilter" title="Filter by property"></select>
      <button class="btn" id="simBtn" title="Simulates a new lead arriving from an ad or a booking site">⚡ <span>Simulate incoming lead</span></button>
    </div>
    <div class="content" id="content"></div>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="modal-wrap" id="modalWrap"><div class="modal" id="modal"></div></div>
  <div class="toasts" id="toasts"></div>
  <div class="tooltip" id="tooltip"></div>
<script>
/* =====================================================================
   GuestFlow MVP prototype — all data is in-memory & simulated.
   Real integrations (Meta Lead Ads, TikTok Lead Gen, Pinterest, Hostfully,
   Twilio, Klaviyo) are represented by connection stubs on the
   Integrations page.
===================================================================== */

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt$ = n => "$" + Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
const NOW = new Date();
function daysAgo(n, h=10){ const d = new Date(NOW); d.setDate(d.getDate()-n); d.setHours(h,15,0,0); return d.toISOString(); }
function daysAhead(n){ const d = new Date(NOW); d.setDate(d.getDate()+n); return d.toISOString(); }
function ago(iso){
  const ms = NOW - new Date(iso);
  const m = Math.round(ms/60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.round(m/60); if (h < 24) return h + "h ago";
  const d = Math.round(h/24); if (d < 30) return d + "d ago";
  return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function inFuture(iso){ return new Date(iso) > NOW; }
function fmtWhen(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ", " + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
let _id = 1000; const uid = () => "id" + (_id++);

/* ---------------- constants ---------------- */
const SOURCES = {
  meta:      {name:"Meta (IG/FB)",  icon:"📘", color:"var(--s1)", key:"meta"},
  tiktok:    {name:"TikTok",        icon:"🎵", color:"var(--s2)", key:"tiktok"},
  direct:    {name:"Direct site",   icon:"🌐", color:"var(--s3)", key:"direct"},
  pinterest: {name:"Pinterest",     icon:"📌", color:"var(--s4)", key:"pinterest"},
  manual:    {name:"Manual",        icon:"✍️", color:"var(--s7)", key:"manual"},
};
const STAGES = ["New","Contacted","Engaged","Quoted","Booked","Lost"];
const STAGE_COLOR = {New:"var(--s1)", Contacted:"var(--s2)", Engaged:"var(--s5)", Quoted:"var(--s4)", Booked:"var(--good)", Lost:"var(--muted)"};
const PLATFORM_META = {

  tiktok:{name:"TikTok", sub:"Lead Generation ads", icon:"🎵"},
  pinterest:{name:"Pinterest", sub:"Lead ad pins", icon:"📌"},

/* ---------------- state ---------------- */
const state = {

  wizard:null, drawerLeadId:null,

  ],

    {id:"pinterest", name:"Pinterest Ads", desc:"Capture lead ad submissions from Pinterest campaigns.", icon:"📌", bg:"#e60023", on:false},
    {id:"hostfully", name:"Hostfully", desc:"Import inquiries & quotes from your direct booking site; detect abandoned inquiries automatically.", icon:"🏡", bg:"#00a699", on:true},
    {id:"hostaway", name:"Hostaway", desc:"Sync inquiries, reservations and guest profiles from Hostaway PMS; non-converting inquiries flow into rescue sequences.", icon:"🧭", bg:"#f5a623", on:true},
    {id:"stayfi", name:"StayFi", desc:"Capture every in-stay guest's email & phone via branded WiFi splash pages — feeds the past-guest re-engagement sequence.", icon:"📶", bg:"#0ea5e9", on:false},
    {id:"ownerrez", name:"OwnerRez", desc:"Sync inquiries, quotes and guests from OwnerRez.", icon:"🔑", bg:"#5a67d8", on:false},

     ]},
    {id:"s2", name:"New Ad Lead Welcome", active:true, channel:"Email + SMS",
     trigger:"New lead captured from Meta, TikTok or Pinterest ad",
     enrolled:64, replies:19, booked:7,
     steps:[

const seqById = id => state.sequences.find(s=>s.id===id);
function mkLead(o){
  const l = Object.assign({id:uid(), stage:"New", notes:[], timeline:[], consent:{email:true,sms:false}}, o);
  state.leads.push(l); return l;
}
function tl(lead, when, icon, what, body, scheduled=false){
  lead.timeline.push({when, icon, what, body, scheduled});
}
function seedSequenceTouches(lead, seqId, startIso, doneCount){
  const seq = seqById(seqId); if(!seq) return;
  lead.sequence = {id:seqId, name:seq.name, step:doneCount, of:seq.steps.length};
  seq.steps.forEach((s,i)=>{
    const icon = s.channel==="sms" ? "💬" : "✉️";
    const offset = [0,1,3,7,10][i] ?? (i*3);
    const base = new Date(startIso); base.setDate(base.getDate()+offset);
    const whenIso = base.toISOString();
    if(i < doneCount){
      tl(lead, whenIso, icon, `${s.channel==="sms"?"SMS":"Email"} sent — ${s.title}`, s.body.replaceAll("{{property}}", propName(lead.property)).replaceAll("{{first_name}}", lead.name.split(" ")[0]).replaceAll("{{host_name}}","Taylor"));
    } else {
      const fut = new Date(NOW); fut.setDate(fut.getDate() + (i-doneCount)*2 + 1);
      tl(lead, fut.toISOString(), icon, `${s.channel==="sms"?"SMS":"Email"} scheduled — ${s.title}`, `Step ${i+1} of “${seq.name}”`, true);
    }
  });
}

/* ---------------- derived ---------------- */
function visibleLeads(){
  return state.leads.filter(l =>
    (state.propFilter==="all" || l.property===state.propFilter) &&
    (state.stageFilter==="All" || l.stage===state.stageFilter) &&
    (state.sourceFilter==="all" || l.source===state.sourceFilter)
  ).sort((a,b)=> new Date(b.created)-new Date(a.created));
}
function kpis(){
  const ls = state.leads.filter(l=> state.propFilter==="all" || l.property===state.propFilter);
  const newLeads = ls.filter(l=> (NOW - new Date(l.created)) < 30*864e5).length;
  const spend = state.campaigns.reduce((a,c)=>a+c.spend,0);
  const adLeads = state.campaigns.reduce((a,c)=>a+c.leads,0);
  const booked = ls.filter(l=>l.stage==="Booked").length;
  const replies = state.sequences.reduce((a,s)=>a+s.replies,0);
  const enrolled = state.sequences.reduce((a,s)=>a+s.enrolled,0);
  return {newLeads, cpl: adLeads? spend/adLeads : 0, replyRate: enrolled? Math.round(100*replies/enrolled):0, booked, recovered: 1260 + booked*0};
}

function toast(html, good=false){
  const t = document.createElement("div");
  t.className = "toast" + (good?" good":"");
  t.innerHTML = html;
  $("#toasts").appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),320); }, 5200);
}
const tip = $("#tooltip");
function showTip(html, x, y){
  tip.innerHTML = html; tip.style.display = "block";
  const w = tip.offsetWidth, h = tip.offsetHeight;
  tip.style.left = Math.min(x+14, innerWidth - w - 10) + "px";
  tip.style.top  = Math.max(8, Math.min(y-h-12, innerHeight - h - 10)) + "px";
}

/* ================= charts ================= */
const CHART_SOURCES = ["meta","tiktok","direct","pinterest"];
const SRC_SLOT = {meta:"var(--s1)", tiktok:"var(--s2)", direct:"var(--s3)", pinterest:"var(--s4)"};
function weeklyLeadData(){
  // 8 weeks of lead counts by source (seeded, deterministic)
  const weeks = ["Jun 1","Jun 8","Jun 15","Jun 22","Jun 29","Jul 6","Jul 13","Jul 20"];
  const data = {
    meta:      [2,3,4,3,5,6,7,8],
    tiktok:    [0,1,1,2,1,2,2,1],
    direct:    [1,2,2,3,3,4,4,5],
    pinterest: [0,0,1,1,1,2,1,2],
  };
  return {weeks, data};
}
function stackedBarChart(){
  const {weeks, data} = weeklyLeadData();
  const W=640, H=210, padL=30, padB=24, padT=10;
  const totals = weeks.map((_,i)=> CHART_SOURCES.reduce((a,s)=>a+data[s][i],0));
  const maxY = Math.max(...totals) + 2;
  const bw = 26, gap = (W-padL-20)/weeks.length;
  const y = v => padT + (H-padB-padT) * (1 - v/maxY);
  let bars = "", gridLines = "", xlabels = "";
  for(let g=0; g<=4; g++){
    const v = Math.round(maxY*g/4);
    const yy = y(v);
    gridLines += `<line x1="${padL}" x2="${W-8}" y1="${yy}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${padL-6}" y="${yy+4}" text-anchor="end" font-size="10" fill="var(--muted)">${v}</text>`;
  }
  weeks.forEach((w,i)=>{
    const cx = padL + gap*i + gap/2;
    let acc = 0;
    CHART_SOURCES.forEach((s,si)=>{
      const v = data[s][i]; if(!v) return;
      const y1 = y(acc+v), y0 = y(acc);
      const isTop = acc+v === totals[i];
      const rTop = isTop ? 4 : 0;
      bars += `<path d="M${cx-bw/2},${y0} L${cx-bw/2},${y1+rTop} Q${cx-bw/2},${y1} ${cx-bw/2+rTop},${y1} L${cx+bw/2-rTop},${y1} Q${cx+bw/2},${y1} ${cx+bw/2},${y1+rTop} L${cx+bw/2},${y0} Z"
        fill="${SRC_SLOT[s]}" stroke="var(--surface)" stroke-width="2" data-week="${i}" class="seg"/>`;
      acc += v;
    });
    xlabels += `<text x="${cx}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--muted)">${w}</text>
      <text x="${cx}" y="${y(totals[i])-6}" text-anchor="middle" font-size="10.5" font-weight="700" fill="var(--ink-2)">${totals[i]}</text>`;
    bars += `<rect x="${cx-gap/2}" y="${padT}" width="${gap}" height="${H-padB-padT}" fill="transparent" data-hit="${i}"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="New leads per week by source" id="leadsChart" style="display:block">
    ${gridLines}
    <line x1="${padL}" x2="${W-8}" y1="${y(0)}" y2="${y(0)}" stroke="var(--baseline)" stroke-width="1"/>
    ${bars}${xlabels}
  </svg>`;
}
function wireLeadsChart(){
  const svg = $("#leadsChart"); if(!svg) return;
  const {weeks, data} = weeklyLeadData();
  svg.addEventListener("mousemove", e=>{
    const t = e.target.closest("[data-hit],[data-week]"); if(!t){ hideTip(); return; }
    const i = +(t.dataset.hit ?? t.dataset.week);
    const total = CHART_SOURCES.reduce((a,s)=>a+data[s][i],0);
    showTip(`<div class="tt-title">Week of ${weeks[i]}</div>` +
      CHART_SOURCES.map(s=>`<div class="tt-row"><span class="k"><span class="swatch" style="background:${SRC_SLOT[s]}"></span>${SOURCES[s].name}</span><b class="num">${data[s][i]}</b></div>`).join("") +
      `<div class="tt-row" style="border-top:1px solid var(--grid);margin-top:3px;padding-top:3px"><span class="k">Total</span><b class="num">${total}</b></div>`, e.clientX, e.clientY);
  });
  svg.addEventListener("mouseleave", hideTip);
}
function sourceBars(){
  const counts = {};
  Object.keys(SOURCES).forEach(k=> counts[k]=0);
  state.leads.forEach(l=> counts[l.source] = (counts[l.source]||0)+1);
  // fold ad-platform historical numbers in for a fuller picture
  const hist = {meta:53, tiktok:9, direct:38, pinterest:6, manual:3};
  Object.keys(hist).forEach(k=> counts[k]+=hist[k]);
  const entries = Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(...entries.map(([,v])=>v));
  return `<div style="padding:14px 18px 18px; display:flex; flex-direction:column; gap:9px">
    ${entries.map(([k,v])=>`
      <div class="row" data-src-bar="${k}" style="gap:12px">
        <span style="width:86px; font-size:12px; color:var(--ink-2); font-weight:600">${SOURCES[k].name}</span>
        <div style="flex:1; height:14px; border-radius:4px; background:var(--surface-2); overflow:hidden">
          <div style="width:${Math.round(100*v/max)}%; height:100%; border-radius:0 4px 4px 0; background:${SOURCES[k].color || 'var(--s7)'}"></div>
        </div>
        <b class="num" style="width:30px; text-align:right; font-size:12.5px">${v}</b>
      </div>`).join("")}
  </div>`;
}

/* ================= lead drawer ================= */
function aiDraftFor(lead){
  const first = lead.name.split(" ")[0];
  const prop = propName(lead.property);
  const lastReply = [...lead.timeline].reverse().find(t=>t.icon==="↩️");
  if(lastReply && /dock|dog/i.test(lastReply.body||"")) {
    return `Hi ${first}! Great questions — yes, the dock is 100% private to the house, and we're dog-friendly (2 dogs max, no fee for stays of 3+ nights). Your Oct 9–12 dates are still open; want me to send a direct-booking quote? It'll run about 12% less than the listing sites. — Taylor`;
  }
  if(lastReply && /video tour|wedding/i.test(lastReply.body||"")) {
    return `Hi ${first}! We'd love to do a video tour — I have Thursday 2–5pm or Saturday morning open. For a 14-guest wedding block we can also hold neighboring dates for your group at a 10% direct rate. Which time works? — Taylor`;
  }
  if(lead.stage==="Quoted") {
    return `Hi ${first}, just floating this back up! Your quote for ${prop} (${lead.dates||"your dates"}) is good through Friday. If it helps, I can add early check-in at no charge. Anything I can tweak? — Taylor`;
  }
  return `Hi ${first}! Thanks for your interest in ${prop}. ${lead.dates ? `I checked and ${lead.dates} is currently available.` : `Happy to check availability whenever you have dates in mind.`} Booking direct saves you the platform fees — want me to send a quick quote? — Taylor`;
}

  const past = l.timeline.filter(t=>!t.scheduled).sort((a,b)=> new Date(a.when)-new Date(b.when));
  const future = l.timeline.filter(t=>t.scheduled);
  $("#drawer").innerHTML = `
    <div class="d-head">
      <div class="row" style="justify-content:space-between">
        <h2>${esc(l.name)}</h2>
        <button class="btn small" onclick="closeDrawer()">✕ Close</button>
      </div>
      <div class="row" style="margin-top:8px; flex-wrap:wrap; gap:7px">
        <span class="pill">${SOURCES[l.source].icon} ${SOURCES[l.source].name}</span>
        <span class="pill"><span class="dot" style="background:${STAGE_COLOR[l.stage]}"></span>${l.stage}</span>
        <span class="pill">🏠 ${esc(propName(l.property))}</span>
        ${l.sequence? `<span class="pill">🔁 ${esc(l.sequence.name)} · step ${l.sequence.step}/${l.sequence.of}</span>`:""}
      </div>
    </div>
    <div class="d-body">
      <div class="kv">
        <span class="k">Email</span><span>${l.email? esc(l.email) : `<span class="muted">not provided (optional)</span>`}</span>
        <span class="k">Phone</span><span>${l.phone? esc(l.phone) : `<span class="muted">not provided (optional)</span>`}</span>
        <span class="k">Address</span><span>${l.address? esc(l.address) : `<span class="muted">not provided (optional)</span>`}</span>
        <span class="k">Dates / need</span><span>${esc(l.dates || "—")}</span>
        <span class="k">Party</span><span>${esc(l.party || "—")}</span>
        <span class="k">Consent</span><span>${l.consent.email? "✅ Email":"🚫 Email"} &nbsp; ${l.consent.sms? "✅ SMS":"🚫 SMS"}</span>
        ${l.campaign? `<span class="k">Campaign</span><span>${esc((state.campaigns.find(c=>c.id===l.campaign)||{}).name||"")}</span>`:""}
      </div>

      <div class="row" style="gap:8px; flex-wrap:wrap; margin:6px 0 4px">
        <select style="width:auto" onchange="setStage('${l.id}', this.value)">
          ${STAGES.map(s=>`<option ${l.stage===s?"selected":""}>${s}</option>`).join("")}
        </select>
        <select style="width:auto" onchange="enrollLead('${l.id}', this.value); this.value=''">
          <option value="" selected disabled>Enroll in sequence…</option>
          ${state.sequences.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("")}
        </select>
        <button class="btn small" onclick="logTouch('${l.id}','email')" ${l.email?"":"disabled"}>✉️ Send email</button>
        <button class="btn small" onclick="logTouch('${l.id}','sms')" ${l.phone&&l.consent.sms?"":"disabled"}>💬 Send SMS</button>
      </div>

      <div class="card" style="padding:14px; margin:12px 0; background:linear-gradient(0deg, var(--surface), var(--surface)); border-color:var(--accent)">
        <div class="row" style="justify-content:space-between">
          <b style="font-size:13px">✨ AI reply assistant</b>
          <span class="pill">drafts from listing details + thread</span>
        </div>

          <button class="btn small primary" onclick="useAiDraft('${l.id}')">Use draft → send</button>
          <button class="btn small" onclick="document.getElementById('aiDraft').textContent=aiDraftFor(state.leads.find(x=>x.id==='${l.id}'))+' '">↻ Regenerate</button>

        </div>

      <h2 class="section" style="margin-top:16px">Timeline</h2>

        ${past.map(t=>`
          <div class="tl-item"><div class="tl-ic">${t.icon}</div>
            <div><div class="t-what">${esc(t.what)}</div>
              ${t.body? `<div class="t-body">${esc(t.body)}</div>`:""}
              <div class="t-when">${fmtWhen(t.when)} · ${ago(t.when)}</div></div></div>`).join("")}
        ${future.length? `<h2 class="section" style="margin-top:14px; font-size:13px">Scheduled next</h2>`:""}

      </div>

      <h2 class="section">Notes</h2>
      ${(l.notes||[]).map(n=>`<div class="tl-item"><div class="tl-ic">📝</div><div><div class="t-body">${esc(n.text)}</div><div class="t-when">${ago(n.when)}</div></div></div>`).join("") || `<p class="small muted">No notes yet.</p>`}
      <div class="row" style="margin-top:8px">
        <input id="noteInput" placeholder="Add a note…">
        <button class="btn" onclick="addNote('${l.id}')">Add</button>
      </div>
    </div>`;
  $("#overlay").classList.add("open");
  $("#drawer").classList.add("open");
}
function closeDrawer(){ $("#overlay").classList.remove("open"); $("#drawer").classList.remove("open"); state.drawerLeadId=null; }
function setStage(id, stage){
  const l = state.leads.find(x=>x.id===id); l.stage = stage;
  if(stage==="Booked" && l.sequence){ l.sequence=null; tl(l, new Date().toISOString(), "✅", "Booked — follow-up sequence auto-stopped", ""); toast(`<b>${esc(l.name)}</b> marked <b>Booked</b> — sequence stopped automatically.`, true); }
  render(); openLead(id);
}
function enrollLead(id, seqId){
  const l = state.leads.find(x=>x.id===id); const s = seqById(seqId);
  l.sequence = {id:s.id, name:s.name, step:0, of:s.steps.length}; s.enrolled++;
  seedSequenceTouches(l, seqId, new Date().toISOString(), 0);
  toast(`<b>${esc(l.name)}</b> enrolled in <b>${esc(s.name)}</b> — step 1 scheduled.`);
  render(); openLead(id);
}
function logTouch(id, ch){
  const l = state.leads.find(x=>x.id===id);
  tl(l, new Date().toISOString(), ch==="sms"?"💬":"✉️", (ch==="sms"?"SMS":"Email")+" sent manually", "Composed in GuestFlow (simulated send).");
  if(l.stage==="New") l.stage="Contacted";
  toast(`${ch==="sms"?"SMS":"Email"} to <b>${esc(l.name)}</b> logged (simulated).`);
  render(); openLead(id);
}
function useAiDraft(id){
  const l = state.leads.find(x=>x.id===id);
  const draft = document.getElementById("aiDraft").textContent.trim();
  tl(l, new Date().toISOString(), "✨", "AI-drafted reply sent", draft);
  if(l.stage==="New") l.stage="Contacted";
  toast(`AI reply sent to <b>${esc(l.name)}</b> (simulated) — sequence paused while you're in the conversation.`, true);
  render(); openLead(id);
}
function addNote(id){
  const v = $("#noteInput").value.trim(); if(!v) return;
  const l = state.leads.find(x=>x.id===id);
  l.notes.push({when:new Date().toISOString(), text:v});
  render(); openLead(id);
}

/* ================= actions ================= */
function toggleCampaign(id){
  const c = state.campaigns.find(x=>x.id===id);
  c.status = c.status==="Active" ? "Paused" : "Active";
  if(!c.started) c.started = new Date().toISOString();
  toast(`Campaign <b>${esc(c.name)}</b> is now <b>${c.status}</b>${c.status==="Active"?" — leads will flow into the CRM automatically":""}.`);
  render();
}
function toggleSeq(id){ const s = seqById(id); s.active = !s.active; render(); }
function toggleInt(id){
  const i = state.integrations.find(x=>x.id===id); i.on = !i.on;
  toast(i.on ? `<b>${esc(i.name)}</b> connected (simulated OAuth).` : `<b>${esc(i.name)}</b> disconnected.`);
  render();
}

  }
  openModal(`
    <div class="m-head"><h2>New lead campaign · step ${w.step} of 4</h2></div>
    <div class="m-body">${stepBars}<h3 style="font-size:14px; margin-bottom:10px">${title}</h3>${body}</div>
    <div class="m-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      ${w.step>1? `<button class="btn" onclick="state.wizard.step--;renderWizard()">← Back</button>`:""}
      ${w.step<4? `<button class="btn primary" onclick="state.wizard.step++;renderWizard()">Continue →</button>`
        : `<button class="btn primary" onclick="launchWizard()">🚀 Launch campaign</button>`}
    </div>`);
}
function toggleInterest(t){
  const a = state.wizard.audience.interests;
  a.includes(t) ? a.splice(a.indexOf(t),1) : a.push(t);
  renderWizard();
}
function launchWizard(){
  const w = state.wizard;
  const fields = Object.entries({name:"Full name",email:"Email",phone:"Phone (optional)",address:"Address (optional)",dates:"Travel dates (optional)",party:"Party size (optional)"}).filter(([k])=>w.fields[k]).map(([,v])=>v);
  state.campaigns.unshift({id:uid(), platform:w.platform, name:w.name || "Untitled campaign", property:w.property, status:"Active",
    objective:"Lead generation", budget:w.budget, spend:0, impressions:0, clicks:0, leads:0,
    audience:`${w.audience.loc} · ${w.audience.age} · ${w.audience.interests.join(", ")||"broad"}`, started:new Date().toISOString(), fields});
  closeModal();
  state.view="campaigns";
  toast(`<b>Campaign launched</b> (simulated) — in the real build this submits to the ${PLATFORM_META[w.platform].name} Marketing API for review. New leads will auto-enroll in your welcome sequence.`, true);
  render();
}

/* ---- add property / manual lead ---- */
function openAddProperty(){
  openModal(`
    <div class="m-head"><h2>Add a property</h2></div>
    <div class="m-body">
      <label>Name</label><input id="npName" placeholder="e.g. Seaside Cottage">
      <label>Location</label><input id="npLoc" placeholder="City, State">
      <div class="grid" style="grid-template-columns:1fr 1fr">
        <div><label>Bedrooms</label><input id="npBeds" type="number" value="2" min="0"></div>
        <div><label>Rental type</label><select id="npType"><option>Short-term</option><option>Long-term</option><option>Both</option></select></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addProperty()">Add property</button>
    </div>`);
}
function addProperty(){
  const name = $("#npName").value.trim() || "New property";
  state.properties.push({id:uid(), name, loc:$("#npLoc").value.trim()||"—", beds:+$("#npBeds").value||0, type:$("#npType").value, img:"🏡"});
  closeModal(); toast(`<b>${esc(name)}</b> added — campaigns, leads and sequences can now be scoped to it.`, true); render();
}
function openManualLead(){
  openModal(`
    <div class="m-head"><h2>Add lead manually</h2></div>
    <div class="m-body">
      <label>Name</label><input id="mlName" placeholder="Guest name">
      <div class="grid" style="grid-template-columns:1fr 1fr">
        <div><label>Email (optional)</label><input id="mlEmail" placeholder="name@email.com"></div>
        <div><label>Phone (optional)</label><input id="mlPhone" placeholder="(555) 555-0100"></div>
      </div>
      <label>Property</label><select id="mlProp">${state.properties.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select>
      <label>Enroll in sequence</label>
      <select id="mlSeq"><option value="">None</option>${state.sequences.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("")}</select>
    </div>
    <div class="m-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addManualLead()">Add lead</button>
    </div>`);
}
function addManualLead(){
  const name = $("#mlName").value.trim() || "New lead";
  const l = mkLead({name, email:$("#mlEmail").value.trim(), phone:$("#mlPhone").value.trim(), source:"manual",
    property:$("#mlProp").value, created:new Date().toISOString(), consent:{email:!!$("#mlEmail").value.trim(), sms:false}});
  tl(l, l.created, "✍️", "Lead added manually", "");
  const seqId = $("#mlSeq").value;
  if(seqId){ const s=seqById(seqId); s.enrolled++; seedSequenceTouches(l, seqId, l.created, 0); }
  closeModal(); toast(`<b>${esc(name)}</b> added to CRM${seqId?" and enrolled in follow-ups":""}.`, true); render();
}

/* ================= lead simulator ================= */
const SIM_POOL = [
  {name:"Hannah Cole", email:"hannah.cole@gmail.com", phone:"(678) 555-0129", source:"meta", campaign:"c1", property:"p1", dates:"Nov 6–9", party:"2 adults"},
  {name:"Luis Herrera", email:"lherrera.fam@gmail.com", phone:"", source:"direct", property:"p2", dates:"Aug 28–31", party:"5"},
  {name:"Grace Kim", email:"", phone:"(212) 555-0154", source:"tiktok", campaign:"c3", property:"p1", dates:"Flexible fall", party:""},
  {name:"The Whitfields", email:"whitfield.trips@aol.com", phone:"(704) 555-0198", source:"pinterest", campaign:"c4", property:"p1", dates:"May 2027", party:"12 (family reunion)"},
  {name:"Omar Nasser", email:"omar.nasser@outlook.com", phone:"(615) 555-0173", source:"direct", property:"p3", dates:"Move-in Oct 1", party:""},
];
let simIdx = 0;
function simulateLead(){
  const t = SIM_POOL[simIdx % SIM_POOL.length]; simIdx++;
  const nowIso = new Date().toISOString();
  const l = mkLead({...t, created:nowIso, consent:{email:!!t.email, sms:!!t.phone}});
  const isAd = ["meta","tiktok","pinterest"].includes(t.source);
  if(isAd){
    tl(l, nowIso, "📥", `Lead captured — ${SOURCES[t.source].name} instant form`, `Fields received: ${["name", t.email&&"email", t.phone&&"phone", t.dates&&"dates"].filter(Boolean).join(", ")}. Optional fields left blank were skipped.`);
    const c = state.campaigns.find(c=>c.id===t.campaign); if(c){ c.leads++; c.spend += Math.round(3+Math.random()*0); }
  } else {
    tl(l, nowIso, "🌐", "Abandoned inquiry — direct booking site", "Visitor started an inquiry/booking but didn't finish. Contact info captured from the form's first step.");
  }
  const seqId = isAd ? "s2" : "s1";
  const s = seqById(seqId); s.enrolled++;
  seedSequenceTouches(l, seqId, nowIso, isAd && t.email ? 1 : 0);
  if(isAd && t.email) tl(l, nowIso, "✉️", "Email sent — welcome + area guide (instant step)", "Sent 8 seconds after capture.");
  state.activity.unshift({when:nowIso, icon: isAd?"📥":"🌐",
    text:`<b>${esc(t.name)}</b> ${isAd? `captured from <b>${SOURCES[t.source].name}</b> ad` : `abandoned an inquiry on <b>${esc(propName(t.property))}</b>`} — auto-enrolled in <b>${esc(s.name)}</b>`});
  toast(`⚡ <b>${esc(t.name)}</b> just came in via <b>${SOURCES[t.source].name}</b>.<br><span class="small">Auto-enrolled in “${esc(s.name)}” — ${t.email? "welcome email sent instantly." : "SMS-first path chosen (no email given)."}</span>`, true);
  render();
  setTimeout(()=>openLead(l.id), 350);
}

/* ================= render root ================= */
const VIEWS = {dashboard:vDashboard, leads:vLeads, campaigns:vCampaigns, sequences:vSequences, properties:vProperties, integrations:vIntegrations};
function render(){
  renderSidebar(); renderTopbar();
  $("#content").innerHTML = VIEWS[state.view]();
  if(state.view==="dashboard") wireLeadsChart();
}
$("#propFilter").addEventListener("change", e=>{ state.propFilter = e.target.value; render(); });
$("#simBtn").addEventListener("click", simulateLead);
render();
</script>
